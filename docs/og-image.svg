<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Glows -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    
    <!-- Filter for Blur/Glow -->
    <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
    
    <!-- Gradient for Text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Main Background -->
  <rect width="1200" height="630" fill="#05080f" />

  <!-- Ambient Lighting -->
  <circle cx="200" cy="150" r="400" fill="url(#glowBlue)" filter="url(#blurFilter)" />
  <circle cx="1000" cy="480" r="400" fill="url(#glowPurple)" filter="url(#blurFilter)" />
  <circle cx="600" cy="315" r="300" fill="url(#glowBlue)" stop-opacity="0.05" filter="url(#blurFilter)" />

  <!-- Neural Network Map -->
  <g stroke-width="1" fill="none" stroke="#3b82f6" stroke-opacity="0.2">
    <!-- Nodes and Connections -->
    <path d="M200,200 L350,100 L500,250 L650,150 L800,300 L950,200" />
    <path d="M200,200 L300,300 L450,400 L600,300 L750,400 L900,300" />
    <path d="M350,100 L450,150 L600,100 L750,150 L900,100" />
    <path d="M300,300 L400,200 L550,150 L700,200 L850,300" />
    <path d="M500,250 L600,300 L700,250" />
    <path d="M650,150 L700,200 L800,150" />
  </g>
  <g fill="#8b5cf6" fill-opacity="0.4">
    <circle cx="200" cy="200" r="3" />
    <circle cx="350" cy="100" r="3" />
    <circle cx="500" cy="250" r="3" />
    <circle cx="650" cy="150" r="3" />
    <circle cx="800" cy="300" r="3" />
    <circle cx="950" cy="200" r="3" />
    <circle cx="300" cy="300" r="3" />
    <circle cx="450" cy="400" r="3" />
    <circle cx="600" cy="300" r="3" />
    <circle cx="750" cy="400" r="3" />
    <circle cx="900" cy="300" r="3" />
    <circle cx="450" cy="150" r="3" />
    <circle cx="600" cy="100" r="3" />
    <circle cx="750" cy="150" r="3" />
    <circle cx="900" cy="100" r="3" />
    <circle cx="400" cy="200" r="3" />
    <circle cx="550" cy="150" r="3" />
    <circle cx="700" cy="200" r="3" />
    <circle cx="850" cy="300" r="3" />
  </g>

  <!-- Typography Layout -->
  <g font-family="Inter, system-ui, -apple-system, sans-serif">
    <!-- Main Title -->
    <text x="600" y="280" text-anchor="middle" font-size="110" font-weight="800" fill="url(#textGradient)" style="letter-spacing: -2px;">GroundZero</text>
    
    <!-- Accent Line -->
    <rect x="540" y="300" width="120" height="4" rx="2" fill="#3b82f6" />

    <!-- Tagline -->
    <text x="600" y="345" text-anchor="middle" font-size="32" font-weight="400" fill="#94a3b8" style="letter-spacing: 2px; text-transform: uppercase;">The Definitive Tech News Map</text>

    <!-- Stats Pill -->
    <g transform="translate(510, 380)">
      <rect width="180" height="50" rx="25" fill="#0f172a" stroke="#3b82f6" stroke-width="1" />
      <!-- Pill Glow -->
      <rect x="0" y="0" width="180" height="50" rx="25" fill="#3b82f6" fill-opacity="0.1" filter="url(#blurFilter)" />
      <text x="90" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">638 Outlets · 36 Verticals</text>
    </g>

    <!-- Footer -->
    <text x="600" y="590" text-anchor="middle" font-size="16" font-weight="500" fill="#475569" style="letter-spacing: 1px;">Powered by GroundZero LLC</text>
  </g>
</svg>
