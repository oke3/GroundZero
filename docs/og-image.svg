<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>
  <!-- Glow orb -->
  <circle cx="900" cy="200" r="300" fill="url(#accent)" opacity="0.06"/>
  <!-- Brand line -->
  <rect x="80" y="120" width="60" height="4" rx="2" fill="url(#accent)"/>
  <!-- Title -->
  <text x="80" y="210" font-family="Inter,-apple-system,sans-serif" font-size="72" font-weight="800" fill="#eef2f8" letter-spacing="-2">GroundZero</text>
  <!-- Tagline -->
  <text x="80" y="280" font-family="Inter,-apple-system,sans-serif" font-size="28" font-weight="400" fill="#8892a8" letter-spacing="-0.3">The Definitive Tech News Map</text>
  <!-- Stats pill -->
  <rect x="80" y="330" width="340" height="44" rx="22" fill="rgba(59,130,246,0.1)"/>
  <text x="250" y="358" font-family="Inter,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#60a5fa" text-anchor="middle">591 Outlets · 36 Verticals</text>
  <!-- Arrow -->
  <text x="80" y="440" font-family="Inter,-apple-system,sans-serif" font-size="16" fill="#5a6480">groundzero.tech</text>
  <!-- Decorative corner accent -->
  <rect x="1120" y="530" width="80" height="80" rx="8" fill="url(#accent)" opacity="0.08"/>
  <text x="1160" y="580" font-family="Inter,-apple-system,sans-serif" font-size="28" font-weight="800" fill="url(#accent)" text-anchor="middle" opacity="0.6">GZ</text>
</svg>
