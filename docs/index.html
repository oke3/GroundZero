<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroundZero | Tech News Reference</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>🌍 GroundZero</h1>
                <p>The Definitive Tech News Map</p>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search outlets, verticals, or keywords..." autocomplete="off">
            </div>
            <div id="statsBar" class="stats-bar"></div>
            <div class="filters">
                <div class="filter-group">
                    <span class="filter-label">Type:</span>
                    <button class="filter-pill active" data-group="type" data-value="all">All</button>
                    <button class="filter-pill" data-group="type" data-value="website">Websites</button>
                    <button class="filter-pill" data-group="type" data-value="newsletter">Newsletters</button>
                    <button class="filter-pill" data-group="type" data-value="podcast">Podcasts</button>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Tier:</span>
                    <button class="filter-pill active" data-group="tier" data-value="all">All</button>
                    <button class="filter-pill" data-group="tier" data-value="primary">Primary ⭐</button>
                    <button class="filter-pill" data-group="tier" data-value="niche">Niche</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="verticalsContainer" class="verticals-grid">
            <!-- Content injected by JS -->
            <div class="loading">Loading the map...</div>
        </div>
    </main>

    <button id="scrollTopBtn" class="scroll-top" aria-label="Scroll to top">↑</button>

    <footer>
        <div class="container">
            <p>&copy; 2026 GroundZero LLC</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
