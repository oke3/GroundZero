<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroundZero | Tech News Reference</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>🌍 GroundZero</h1>
                <p>The Definitive Tech News Map</p>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search outlets, verticals, or keywords...">

        </div>

    <main class="container">
        <div id="verticalsContainer" class="verticals-grid">

            <div class="loading">Loading the map...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 GroundZero LLC</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
