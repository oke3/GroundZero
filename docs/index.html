<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroundZero | The Definitive Tech News Map</title>
    <meta name="description" content="Curated directory of 591 top tech news outlets across 36 verticals.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <header>
        <div class="hero">
            <div class="hero-bg"></div>
            <div class="container">
                <div class="logo">
                    <h1>GroundZero</h1>
                    <p class="tagline">The Definitive Tech News Map</p>
                </div>
                <div class="search-row">
                    <div class="search-wrapper">
                        <span class="search-icon">⌕</span>
                        <input type="text" id="searchInput" placeholder="Search 591 outlets across 36 verticals..." autocomplete="off" aria-label="Search outlets">
                        <button id="surpriseBtn" class="surprise-btn" title="Surprise me" aria-label="Random outlet">🎲</button>
                        <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
                    </div>
                    <div id="typeahead" class="typeahead"></div>
                </div>
                <div id="statsBar" class="stats-bar"></div>
            </div>
        </div>
        <nav class="category-nav" id="categoryNav" aria-label="Browse by category">
            <div class="container" id="tabsContainer"></div>
        </nav>
        <div class="container">
            <div id="recentlyViewed" class="recently-viewed"></div>
        </div>
    </header>

    <main class="container" id="main">
        <div id="verticalsContainer" class="verticals-grid">
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
        </div>
    </main>

    <!-- Surprise modal -->
    <div id="surpriseModal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal">
            <button class="modal-close" aria-label="Close">&times;</button>
            <div class="modal-content"></div>
        </div>
    </div>

    <button id="scrollTopBtn" class="scroll-top" aria-label="Scroll to top">↑</button>

    <footer>
        <div class="container">
            <p>&copy; 2026 GroundZero LLC · <span id="footerStats"></span></p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
