<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=optional" rel="stylesheet">

    <!-- Theme FOUC guard -->
    <script>(function(){var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.dataset.theme='light'}})();</script>

    <title>GroundZero | The Definitive Tech News Map</title>
    <meta name="description" content="Curated directory of 592 tech news outlets across 36 verticals.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.svg">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="GroundZero | The Definitive Tech News Map">
    <meta property="og:description" content="Curated directory of 592 top tech news outlets across 36 verticals.">
    <meta property="og:image" content="og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GroundZero | The Definitive Tech News Map">
    <meta name="twitter:description" content="Curated directory of 592 top tech news outlets across 36 verticals.">
    <meta name="twitter:image" content="og-image.svg">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="progressBar" class="progress-bar" role="progressbar" aria-label="Reading progress"></div>
    <a href="#main" class="skip-link">Skip to content</a>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <header>
        <div class="hero">
            <div class="hero-bg"></div>
            <div class="container">
                <div class="logo">
                    <h1>GroundZero</h1>
                    <p class="tagline">The Definitive Tech News Map</p>
                </div>
                <div class="search-row">
                    <div class="search-wrapper">
                        <span class="search-icon">⌕</span>
                        <input type="text" id="searchInput" placeholder="Search 592 outlets across 36 verticals..." autocomplete="off" aria-label="Search outlets">
                        <button id="clearSearch" class="clear-search" aria-label="Clear search">✕</button>
                        <button id="surpriseBtn" class="surprise-btn" title="Surprise me" aria-label="Random outlet">🎲</button>
                        <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
                    </div>
                    <div id="typeahead" class="typeahead"></div>
                    <div id="searchCount" class="search-count"></div>
                </div>
                <div id="statsBar" class="stats-bar"></div>
            </div>
        </div>
        <nav class="category-nav" id="categoryNav" aria-label="Browse by category">
            <div class="container">
                <div class="tabs-scroll" id="tabsContainer"></div>
            </div>
        </nav>
        <div class="container">
            <div id="recentlyViewed" class="recently-viewed"></div>
        </div>
    </header>

    <main class="container" id="main">
        <div id="verticalsContainer" class="verticals-grid">
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-shimmer"></div></div>
        </div>
    </main>

    <!-- Surprise modal -->
    <div id="surpriseModal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal">
            <button class="modal-close" aria-label="Close">&times;</button>
            <div class="modal-content"></div>
        </div>
    </div>

    <button id="scrollTopBtn" class="scroll-top" aria-label="Scroll to top">↑</button>

    <footer>
        <div class="container">
            <p class="footer-copy">&copy; 2026 GroundZero LLC</p>
            <div class="footer-socials">
                <a href="https://www.facebook.com/share/1SoNKYMZVa/" target="_blank" rel="noopener" aria-label="Facebook" class="social-link">

    </footer>

    <script src="js/app.js"></script>
</body>
</html>
